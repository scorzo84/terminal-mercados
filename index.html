<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorzoNow - Terminal Inteligente</title>
    <meta name="description" content="Terminal inteligente de mercados financieros por Corzo Tech.">
    <style>
        /* Elimina márgenes y asegura que el iframe ocupe toda la ventana */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita doble barra de desplazamiento */
            background-color: #ffffff;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- URL con ?embed=true para ocultar la interfaz de Streamlit -->
    <iframe 
        src="https://streamlit.app" 
        allow="clipboard-read; clipboard-write"
        allowfullscreen>
    </iframe>
</body>
</html>
