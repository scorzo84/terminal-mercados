<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CorzoNow - Terminal Inteligente</title>
    
    <!-- Configuración para evitar que los móviles bloqueen el contenido -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Elimina cualquier espacio blanco y asegura el 100% de la pantalla */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        
        /* El contenedor que "esconde" la dirección real */
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <!-- Usamos ?embed=true para que se vea limpio y profesional -->
        <iframe 
            src="https://corzonow.streamlit.app" 
            allow="clipboard-read; clipboard-write"
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
