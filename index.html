<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CorzoNow - Terminal Inteligente</title>
    <style>
        /* Ajuste universal para cualquier pantalla */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita rebotes de scroll en iPhone */
            background-color: #ffffff;
        }
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
        }
        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <iframe 
            src="https://corzonow.streamlit.app/?embed=true" 
            allow="clipboard-read; clipboard-write"
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
