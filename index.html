<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorzoNow - Terminal Inteligente</title>
    <!-- Configuración para buscadores -->
    <meta name="description" content="Accede a la Terminal Inteligente de Corzo Tech para análisis de mercados en tiempo real.">
    
    <!-- REDIRECCIÓN INSTANTÁNEA (Evita errores de pantalla gris en móviles) -->
    <meta http-equiv="refresh" content="0; url=https://streamlit.app">
    
    <script type="text/javascript">
        // Redirección por JavaScript para mayor velocidad
        window.location.href = "https://streamlit.app";
    </script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #4a4a4a;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0077b6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p>Cargando Terminal Inteligente CorzoNow...</p>
        <p style="font-size: 12px; color: #888;">Si no redirige automáticamente, <a href="https://streamlit.app">haz clic aquí</a>.</p>
    </div>
</body>
</html>
